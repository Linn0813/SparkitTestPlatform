# Sparkit 测试管理平台（Python FastAPI + Vue）专用中间件
# 容器名 sparkit-tp-*，与 Java 业务 sparkit-dev-* 区分
name: sparkit-testplatform

services:
  mysql:
    image: mysql:8.0
    container_name: sparkit-tp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sparkit
      MYSQL_USER: sparkit
      MYSQL_PASSWORD: sparkit
    ports:
      - "3307:3306"
    volumes:
      - sparkit_tp_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: sparkit-tp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sparkit_tp_minio_data:/data

volumes:
  # 逻辑名 tp；物理卷名保持 sparkit_*，避免改名后丢已有数据
  sparkit_tp_mysql_data:
    name: sparkit_mysql_data
  sparkit_tp_minio_data:
    name: sparkit_minio_data
