services:
  mysql:
    image: mysql:8.0
    container_name: sparkit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sparkit
      MYSQL_USER: sparkit
      MYSQL_PASSWORD: sparkit
    ports:
      - "3307:3306"
    volumes:
      - sparkit_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sparkit_mysql_data:
